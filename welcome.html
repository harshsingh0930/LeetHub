<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harsh's LeetHub</title>

    <link rel="stylesheet" href="css/welcome.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.4.1/semantic.min.css"
    />

    <script src="scripts/jquery-3.3.1.min.js"></script>
    <script src="scripts/semantic-2.4.1.min.js"></script>
  </head>

  <body>
    <main class="ui grid container" role="main">
      <div class="sixteen wide center aligned column">
        <header class="hero-block">
          <p class="caption title-row" style="font-size: 9em">
            <span class="title">
              <span class="brand-prefix">Harsh's</span>
              <span class="brand-main">Leet<span class="highlight">Hub</span></span>
            </span>
            <img
              src="assets/firefox.svg"
              alt="Firefox logo"
              class="brand-icon"
            />
          </p>

          <p id="caption" class="caption">
            Automatically sync your code from LeetCode to GitHub
          </p>

          <p hidden id="error" aria-live="polite"></p>
          <p hidden id="success" aria-live="polite"></p>
          <p hidden id="unlink" aria-live="polite">
            Linked the wrong repo? <a href="#">Unlink</a>.
          </p>
        </header>
      </div>

      <section
        id="hook_mode"
        class="ui grid container"
        style="display: none"
        aria-label="Repository setup"
      >
        <div class="six wide column">
          <p class="ui start large header center aligned">
            To get started with Harsh's LeetHub
          </p>
        </div>

        <div class="four wide left aligned column">
          <div class="ui form">
            <div class="field">
              <label for="type" class="sr-only">Repository action</label>
              <select id="type">
                <option value="">Pick an Option</option>
                <option value="new">Create a new Private Repository</option>
                <option value="link">Link an Existing Repository</option>
              </select>
            </div>
          </div>
        </div>

        <div class="six wide column">
          <div class="ui form">
            <div class="field">
              <label for="name" class="sr-only">Repository name</label>
              <input
                autocomplete="off"
                id="name"
                placeholder="Repository Name"
                type="text"
              />
            </div>
          </div>
        </div>

        <div class="sixteen wide right aligned column">
          <button id="hook_button" disabled class="positive ui button">
            Get Started
          </button>
        </div>
      </section>

      <section
        id="commit_mode"
        class="ui grid container"
        style="display: none"
        aria-label="Progress overview"
      >
        <div class="eight wide center aligned column">
          <div class="ui inverted large header">
            Problems Solved: <span id="p_solved">0</span>
          </div>

          <div class="ui inverted large header">
            <span class="difficulty easy">
              Easy: <span id="p_solved_easy">0</span>
            </span>
            <span class="difficulty medium">
              Medium: <span id="p_solved_medium">0</span>
            </span>
            <span class="difficulty hard">
              Hard: <span id="p_solved_hard">0</span>
            </span>
          </div>
        </div>

        <div class="eight wide center aligned column">
          <div class="ui inverted large header">
            Want more features?
            <a
              class="feature-request"
              target="_blank"
              rel="noopener noreferrer"
              href="https://github.com/harshsingh0930"
            >
              Here!
            </a>
          </div>
        </div>
      </section>

      <div class="sixteen wide right aligned column"></div>
    </main>

    <script src="scripts/browserutil.js"></script>
    <script src="scripts/welcome.js"></script>
  </body>
</html>
